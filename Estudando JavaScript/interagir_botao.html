<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interação JS</title>

</head>
<body>
        <!-- Este é o lugar onde pode mudar o texto do botão -->
    <button id="meuBotao">Clique aqui</button>

    <script>
        // Seleciona o botão pelo ID
        const botao = document.getElementById('meuBotao');

        // Adiciona um evento de clique ao botão
        botao.addEventListener('click', function() {
            alert('Você clicou no botão!');
        });
        // Script serve para incorporar ou referenciar códigos JavaScript em um documento HTML. Ele pode ser usado para adicionar interatividade, manipular elementos da página, fazer requisições assíncronas, entre outras funcionalidades. O código dentro da tag <script> é executado quando a página é carregada ou quando o evento especificado ocorre (como um clique).
    </script>

</body>
</html>
